        share_with_uuid:
          type: string
          description: 'The id of the entity (user, workspace or organization) to share with'
          format: uuid
        share_with_type:
          $ref: '#/components/schemas/EntityType'
    SharingOut:
      title: SharingOut
      required:
        - library_id
        - org_id
        - role
        - share_with_type
        - share_with_uuid
      type: object
      properties:
        library_id:
          title: Library Id
          type: string
          format: uuid
        user_id:
          title: User Id
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
        org_id:
          title: Org Id
          type: string
          format: uuid
        role:
          type: string
        share_with_type:
          type: string
        share_with_uuid:
          title: Share With Uuid
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
    EntityType:
      title: EntityType
      enum:
        - User
        - Workspace
        - Org
      type: string
      description: 'The type of entity, used to share a library.'
      x-speakeasy-unknown-values: allow
    CompletionEvent:
      title: CompletionEvent
      required:
        - data
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CompletionChunk'
    CompletionChunk:
      title: CompletionChunk
      required:
        - id
        - model
        - choices
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        created:
          type: integer
        model:
          type: string
        usage:
          $ref: '#/components/schemas/UsageInfo'
        choices:
          type: array
          items:
            $ref: '#/components/schemas/CompletionResponseStreamChoice'
    CompletionResponseStreamChoice:
      title: CompletionResponseStreamChoice
      required:
        - index
        - delta
        - finish_reason
      type: object
      properties:
        index:
          type: integer
        delta:
          $ref: '#/components/schemas/DeltaMessage'
        finish_reason:
          enum:
            - stop
            - length
            - error
            - tool_calls
            - null
          type:
            - 'null'
            - string
    ResponseBase:
      title: ResponseBase
      type: object
      properties:
        id:
          type: string
          example: cmpl-e5cc70bb28c444948073e77776eb30ef
        object:
          type: string
          example: chat.completion
        model:
          type: string
          example: mistral-small-latest
        usage:
          $ref: '#/components/schemas/UsageInfo'
    ChatCompletionChoice:
      title: ChatCompletionChoice
      required:
        - index
        - finish_reason
        - message
      type: object
      properties:
        index:
          type: integer
          example: 0
        message:
          $ref: '#/components/schemas/AssistantMessage'
        finish_reason:
          enum:
            - stop
            - length
            - model_length
            - error
            - tool_calls
          type: string
          example: stop
    DeltaMessage:
      title: DeltaMessage
      type: object
      properties:
        role:
          anyOf:
            - type: string
            - type: 'null'
        content:
          anyOf:
            - type: string
            - type: 'null'
            - type: array
              items:
                $ref: '#/components/schemas/ContentChunk'
        tool_calls:
          anyOf:
            - type: 'null'
            - type: array
              items:
                $ref: '#/components/schemas/ToolCall'
    ChatCompletionResponseBase:
      allOf:
        - $ref: '#/components/schemas/ResponseBase'
        - title: ChatCompletionResponseBase
          type: object
          properties:
            created:
              type: integer
              example: 1702256327
    ChatCompletionResponse:
      allOf:
        - $ref: '#/components/schemas/ChatCompletionResponseBase'
        - title: ChatCompletionResponse
          required:
            - id
            - object
            - data
            - model
            - usage
            - created
            - choices
          type: object
          properties:
            choices:
              type: array
              items:
                $ref: '#/components/schemas/ChatCompletionChoice'
    FIMCompletionResponse:
      allOf:
        - $ref: '#/components/schemas/ChatCompletionResponse'
        - type: object
          properties:
            model:
              type: string
              example: codestral-latest
    EmbeddingResponseData:
      examples:
        - object: embedding
          embedding:
            - 0.1
            - 0.2
            - 0.3
          index: 0
        - object: embedding
          embedding:
            - 0.4
            - 0.5
            - 0.6
          index: 1
      title: EmbeddingResponseData
      type: object
      properties:
        object:
          type: string
          example: embedding
        embedding:
          type: array
          items:
            type: number
          example:
            - 0.1
            - 0.2
            - 0.3
        index:
          type: integer
          example: 0
    EmbeddingResponse:
      allOf:
        - $ref: '#/components/schemas/ResponseBase'
        - required:
            - id
            - object
            - data
            - model
            - usage
          type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/EmbeddingResponseData'
  securitySchemes:
    ApiKey:
      type: http
      scheme: bearer
